name: Track Bluesky Followers

on:
  schedule:
    # Runs daily at 8:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Fetch follower count
        run: |
          RESPONSE=$(curl -s "https://public.api.bsky.app/xrpc/app.bsky.actor.getProfile?actor=cgdev.org")

          FOLLOWERS=$(echo "$RESPONSE" | jq -r '.followersCount')
          FOLLOWING=$(echo "$RESPONSE" | jq -r '.followsCount')
          POSTS=$(echo "$RESPONSE" | jq -r '.postsCount')
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          # Create CSV with header if it doesn't exist
          if [ ! -f data/followers.csv ]; then
            mkdir -p data
            echo "timestamp,followers,following,posts" > data/followers.csv
          fi

          echo "${TIMESTAMP},${FOLLOWERS},${FOLLOWING},${POSTS}" >> data/followers.csv

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/followers.csv
          git diff --staged --quiet || git commit -m "Update follower count: $(date -u +%Y-%m-%d)"
          git push